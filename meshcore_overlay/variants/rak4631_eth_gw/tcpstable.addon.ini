; Static-IP TCP listener diagnostic target for RAK4631 / RAK10720.
; Keeps the BLE companion path and leaves the Ethernet listener in a
; minimal nonblocking state so TCP accept can be serviced reliably.

[env:RAK_4631_companion_repeater_eth_ble_tcpstable]
extends = env:RAK_4631_companion_repeater_eth_ble_staticdebug
build_flags =
  ${env:RAK_4631_companion_repeater_eth_ble_staticdebug.build_flags}
  -D ETH_DISABLE_DHCP=1
  -D ETH_DISABLE_MAINTAIN=1
  -D ETH_CHECK_LINK_STATUS=0
  -D ETH_NO_REINIT_AFTER_SUCCESS=1
  -D ETH_TCP_SERVER_DEBUG=1
  -D ETH_GATEWAY_A=192
  -D ETH_GATEWAY_B=168
  -D ETH_GATEWAY_C=3
  -D ETH_GATEWAY_D=1
  -D ETH_SUBNET_A=255
  -D ETH_SUBNET_B=255
  -D ETH_SUBNET_C=255
  -D ETH_SUBNET_D=0
  -D ETH_DNS_A=192
  -D ETH_DNS_B=168
  -D ETH_DNS_C=3
  -D ETH_DNS_D=1
