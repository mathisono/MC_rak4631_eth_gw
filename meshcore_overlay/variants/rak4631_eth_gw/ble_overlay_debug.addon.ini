; Minimal BLE-only companion debug target.
; This inherits the upstream BLE companion radio env and adds only the debug repeat flag.

[env:RAK_4631_companion_ble_overlay_debug]
extends = env:RAK_4631_companion_radio_ble
build_flags =
  ${env:RAK_4631_companion_radio_ble.build_flags}
  -D BLE_PIN_CODE=123456
  -D FORCE_CLIENT_REPEAT=1
