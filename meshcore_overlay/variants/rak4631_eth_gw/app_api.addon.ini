[env:RAK_4631_companion_radio_eth_clean]
extends = rak4631
board_build.ldscript = boards/nrf52840_s140_v6_extrafs.ld
board_upload.maximum_size = 712704
build_flags =
  ${rak4631.build_flags}
  -I examples/companion_radio/ui-new
  -D WITH_ETHERNET_COMPANION=1
  -D TCP_PORT=4403
  -D ETH_DEBUG_LOGGING=1
  -D ETH_STATIC_ONLY=1
  -D ETH_STATIC_IP=192,168,3,55
  -D ETH_GATEWAY=192,168,3,3
  -D ETH_SUBNET=255,255,255,0
  -D PIN_3V3_EN=34
  -D PIN_ETHERNET_RESET=21
  -D PIN_ETHERNET_SS=26
  -D MAX_ETH_CLIENTS=3
  -D MAX_CONTACTS=200
  -D MAX_GROUP_CHANNELS=16
build_src_filter = ${rak4631.build_src_filter}
  +<helpers/SerialEthernetInterface.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${rak4631.lib_deps}
  https://github.com/RAKWireless/RAK13800-W5100S/archive/1.0.2.zip
  densaugeo/base64 @ ~1.4.0

[env:RAK_4631_companion_radio_eth]
extends = env:RAK_4631_companion_radio_eth_clean
