; Minimal Ethernet ping-only diagnostic target for RAK4631 / RAK10720.
; Starts BLE normally, then initializes W5100S with a fixed IP and leaves it alone.

[env:RAK_4631_companion_repeater_eth_ble_pingonly]
extends = env:RAK_4631_companion_repeater_eth_ble_staticdebug
build_flags =
  ${env:RAK_4631_companion_repeater_eth_ble_staticdebug.build_flags}
  -D ETH_PING_ONLY=1
  -D ETH_DISABLE_MAINTAIN=1
  -D ETH_CHECK_LINK_STATUS=0
  -D ETH_NO_REINIT_AFTER_SUCCESS=1
