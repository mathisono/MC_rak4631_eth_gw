; Ethernet diagnostic companion target for RAK4631 / RAK10720.
; Adds verbose Ethernet startup logging while keeping the BLE companion path.

[env:RAK_4631_companion_repeater_eth_ble_ethdebug]
extends = env:RAK_4631_companion_repeater_eth_ble
build_flags =
  ${env:RAK_4631_companion_repeater_eth_ble.build_flags}
  -D ETH_DEBUG_LOGGING=1
  -D BLE_DEBUG_LOGGING=1
  -D ETH_START_DELAY_MS=30000
  -D ETH_CHECK_LINK_STATUS=1
