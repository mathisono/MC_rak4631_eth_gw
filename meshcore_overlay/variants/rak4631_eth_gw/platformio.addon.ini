; Copy these envs into MeshCore's variants/rak4631/platformio.ini.
;
; Primary target: MeshCore repeater role with command/API access over BOTH
; BLE UART and RAK10720 Ethernet TCP. MQTT is intentionally not enabled.

[env:RAK_4631_repeater_eth_ble_api]
extends = rak4631
board_build.ldscript = boards/nrf52840_s140_v6_extrafs.ld
board_upload.maximum_size = 712704
build_flags =
  ${rak4631.build_flags}
  -D WITH_ETHERNET_COMMAND_API=1
  -D WITH_BLE_COMMAND_API=1
  -D ETH_API_PORT=4403
  -D BLE_API_NAME_PREFIX='"MC-RPT-"'
  -D BLE_API_PIN_CODE=123456
  -D PIN_3V3_EN=34
  -D PIN_ETHERNET_RESET=21
  -D PIN_ETHERNET_SS=26
  -D ETH_SPI_PORT=SPI1
  -D ETH_SPI_SCK=3
  -D ETH_SPI_MISO=29
  -D ETH_SPI_MOSI=30
  -D ADVERT_NAME='"RAK4631 EthBLE Repeater"'
  -D MAX_NEIGHBOURS=50
build_src_filter = ${rak4631.build_src_filter}
  +<helpers/nrf52/EthernetCommandAPI.cpp>
  +<helpers/nrf52/BLECommandAPI.cpp>
  +<helpers/nrf52/SerialBLEInterface.cpp>
  +<../examples/simple_repeater/*.cpp>
lib_deps =
  ${rak4631.lib_deps}
  https://github.com/RAKWireless/RAK13800-W5100S/archive/1.0.2.zip

; Ethernet-only repeater command/API target.
[env:RAK_4631_repeater_eth_api]
extends = rak4631
board_build.ldscript = boards/nrf52840_s140_v6_extrafs.ld
board_upload.maximum_size = 712704
build_flags =
  ${rak4631.build_flags}
  -D WITH_ETHERNET_COMMAND_API=1
  -D ETH_API_PORT=4403
  -D PIN_3V3_EN=34
  -D PIN_ETHERNET_RESET=21
  -D PIN_ETHERNET_SS=26
  -D ETH_SPI_PORT=SPI1
  -D ETH_SPI_SCK=3
  -D ETH_SPI_MISO=29
  -D ETH_SPI_MOSI=30
  -D ADVERT_NAME='"RAK4631 Ethernet Repeater"'
  -D MAX_NEIGHBOURS=50
build_src_filter = ${rak4631.build_src_filter}
  +<helpers/nrf52/EthernetCommandAPI.cpp>
  +<../examples/simple_repeater/*.cpp>
lib_deps =
  ${rak4631.lib_deps}
  https://github.com/RAKWireless/RAK13800-W5100S/archive/1.0.2.zip

; Legacy/experimental target: Companion binary API over Ethernet.
[env:RAK_4631_companion_radio_eth]
extends = rak4631
board_build.ldscript = boards/nrf52840_s140_v6_extrafs.ld
board_upload.maximum_size = 712704
build_flags =
  ${rak4631.build_flags}
  -I examples/companion_radio/ui-new
  -D WITH_ETHERNET_TCP_API=1
  -D TCP_PORT=4403
  -D PIN_3V3_EN=34
  -D PIN_ETHERNET_RESET=21
  -D PIN_ETHERNET_SS=26
  -D ETH_SPI_PORT=SPI1
  -D ETH_SPI_SCK=3
  -D ETH_SPI_MISO=29
  -D ETH_SPI_MOSI=30
  -D MAX_CONTACTS=200
  -D MAX_GROUP_CHANNELS=16
  -D OFFLINE_QUEUE_SIZE=128
build_src_filter = ${rak4631.build_src_filter}
  +<helpers/nrf52/EthernetSerialInterface.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${rak4631.lib_deps}
  https://github.com/RAKWireless/RAK13800-W5100S/archive/1.0.2.zip
  densaugeo/base64 @ ~1.4.0

; Optional future target: repeater BLE + Ethernet API + MQTT bridge.
[env:RAK_4631_repeater_eth_ble_api_mqtt]
extends = env:RAK_4631_repeater_eth_ble_api
build_flags =
  ${env:RAK_4631_repeater_eth_ble_api.build_flags}
  -D WITH_MQTT_BRIDGE=1
  -D MQTT_HOST='"192.168.1.10"'
  -D MQTT_PORT=1883
  -D MQTT_BASE_TOPIC='"meshcore/kj6dzb"'
build_src_filter =
  ${env:RAK_4631_repeater_eth_ble_api.build_src_filter}
  +<helpers/bridges/MQTTBridge.cpp>
lib_deps =
  ${env:RAK_4631_repeater_eth_ble_api.lib_deps}
  knolleary/PubSubClient @ ^2.8
