; Copy this env into MeshCore's variants/rak4631/platformio.ini
; after the normal RAK_4631_companion_radio_usb / ble targets.
;
; Primary target: MeshCore Companion API over RAK10720 Ethernet.
; MQTT is intentionally not enabled here.

[env:RAK_4631_companion_radio_eth]
extends = rak4631
board_build.ldscript = boards/nrf52840_s140_v6_extrafs.ld
board_upload.maximum_size = 712704
build_flags =
  ${rak4631.build_flags}
  -I examples/companion_radio/ui-new
  -D WITH_ETHERNET_TCP_API=1
  -D TCP_PORT=4403
  -D PIN_3V3_EN=34
  -D PIN_ETHERNET_RESET=21
  -D PIN_ETHERNET_SS=26
  -D ETH_SPI_PORT=SPI1
  -D ETH_SPI_SCK=3
  -D ETH_SPI_MISO=29
  -D ETH_SPI_MOSI=30
  -D MAX_CONTACTS=200
  -D MAX_GROUP_CHANNELS=16
  -D OFFLINE_QUEUE_SIZE=128
; NOTE: DO NOT ENABLE unless debugging locally
;  -D ETH_DEBUG_LOGGING=1
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${rak4631.build_src_filter}
  +<helpers/nrf52/EthernetSerialInterface.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${rak4631.lib_deps}
  https://github.com/RAKWireless/RAK13800-W5100S/archive/1.0.2.zip
  densaugeo/base64 @ ~1.4.0

; Optional future target: TCP Companion API + MQTT bridge.
; Keep this parked until the Ethernet API build passes and size/RAM are measured.
[env:RAK_4631_companion_radio_eth_mqtt]
extends = env:RAK_4631_companion_radio_eth
build_flags =
  ${env:RAK_4631_companion_radio_eth.build_flags}
  -D WITH_MQTT_BRIDGE=1
  -D MQTT_HOST='"192.168.1.10"'
  -D MQTT_PORT=1883
  -D MQTT_BASE_TOPIC='"meshcore/kj6dzb"'
build_src_filter =
  ${env:RAK_4631_companion_radio_eth.build_src_filter}
  +<helpers/bridges/MQTTBridge.cpp>
lib_deps =
  ${env:RAK_4631_companion_radio_eth.lib_deps}
  knolleary/PubSubClient @ ^2.8
