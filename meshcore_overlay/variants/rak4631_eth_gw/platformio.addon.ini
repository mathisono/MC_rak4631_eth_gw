; Clean companion-radio Ethernet target.
; This is the primary MeshCore Companion API over Ethernet build.

[env:RAK_4631_companion_radio_eth]
extends = rak4631
board_build.ldscript = boards/nrf52840_s140_v6_extrafs.ld
board_upload.maximum_size = 712704
build_flags =
  ${rak4631.build_flags}
  -I examples/companion_radio/ui-new
  -D WITH_ETHERNET_TCP_API=1
  -D ETH_DEBUG_LOGGING=1
  -D ETH_TCP_SERVER_DEBUG=1
  -D ETH_START_DELAY_MS=30000
  -D ETH_USE_STATIC_IP=1
  -D ETH_STATIC_IP_A=192
  -D ETH_STATIC_IP_B=168
  -D ETH_STATIC_IP_C=3
  -D ETH_STATIC_IP_D=55
  -D ETH_GATEWAY_A=192
  -D ETH_GATEWAY_B=168
  -D ETH_GATEWAY_C=3
  -D ETH_GATEWAY_D=1
  -D ETH_SUBNET_A=255
  -D ETH_SUBNET_B=255
  -D ETH_SUBNET_C=255
  -D ETH_SUBNET_D=0
  -D ETH_DNS_A=192
  -D ETH_DNS_B=168
  -D ETH_DNS_C=3
  -D ETH_DNS_D=1
  -D ETH_DISABLE_DHCP=1
  -D ETH_DISABLE_MAINTAIN=1
  -D ETH_CHECK_LINK_STATUS=0
  -D ETH_NO_REINIT_AFTER_SUCCESS=1
  -D TCP_PORT=4403
  -D PIN_3V3_EN=34
  -D PIN_ETHERNET_RESET=21
  -D PIN_ETHERNET_SS=26
  -D ETH_SPI_PORT=SPI1
  -D ETH_SPI_SCK=3
  -D ETH_SPI_MISO=29
  -D ETH_SPI_MOSI=30
  -D MAX_CONTACTS=200
  -D MAX_GROUP_CHANNELS=16
  -D OFFLINE_QUEUE_SIZE=128
build_src_filter = ${rak4631.build_src_filter}
  +<helpers/nrf52/EthernetSerialInterface.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${rak4631.lib_deps}
  https://github.com/RAKWireless/RAK13800-W5100S/archive/1.0.2.zip
  densaugeo/base64 @ ~1.4.0

; Optional verbose alias for the primary Ethernet companion target.
[env:RAK_4631_companion_radio_eth_staticdebug]
extends = env:RAK_4631_companion_radio_eth
build_flags =
  ${env:RAK_4631_companion_radio_eth.build_flags}

; Optional future target: Companion API + MQTT bridge.
[env:RAK_4631_companion_radio_eth_mqtt]
extends = env:RAK_4631_companion_radio_eth
build_flags =
  ${env:RAK_4631_companion_radio_eth.build_flags}
  -D WITH_MQTT_BRIDGE=1
  -D MQTT_HOST='"192.168.1.10"'
  -D MQTT_PORT=1883
  -D MQTT_BASE_TOPIC='"meshcore/kj6dzb"'
build_src_filter =
  ${env:RAK_4631_companion_radio_eth.build_src_filter}
  +<helpers/bridges/MQTTBridge.cpp>
lib_deps =
  ${env:RAK_4631_companion_radio_eth.lib_deps}
  knolleary/PubSubClient @ ^2.8
