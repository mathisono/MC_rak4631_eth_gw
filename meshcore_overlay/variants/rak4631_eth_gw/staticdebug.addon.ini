; Static-IP Ethernet companion debug target for RAK4631 / RAK10720.
; Inherits the current eth-debug target and swaps DHCP for a fixed address.

[env:RAK_4631_companion_repeater_eth_ble_staticdebug]
extends = env:RAK_4631_companion_repeater_eth_ble_ethdebug
build_flags =
  ${env:RAK_4631_companion_repeater_eth_ble_ethdebug.build_flags}
  -D ETH_USE_STATIC_IP=1
  -D ETH_STATIC_IP_A=192
  -D ETH_STATIC_IP_B=168
  -D ETH_STATIC_IP_C=3
  -D ETH_STATIC_IP_D=55
  -D ETH_GATEWAY_A=192
  -D ETH_GATEWAY_B=168
  -D ETH_GATEWAY_C=3
  -D ETH_GATEWAY_D=3
  -D ETH_SUBNET_A=255
  -D ETH_SUBNET_B=255
  -D ETH_SUBNET_C=255
  -D ETH_SUBNET_D=0
  -D ETH_DNS_A=192
  -D ETH_DNS_B=168
  -D ETH_DNS_C=3
  -D ETH_DNS_D=3
