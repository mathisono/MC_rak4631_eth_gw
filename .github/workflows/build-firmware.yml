name: Build firmware

on:
  workflow_dispatch:
    inputs:
      meshcore_ref:
        description: "MeshCore branch, tag, or commit to build from"
        required: true
        default: "main"
      target_env:
        description: "PlatformIO environment"
        required: true
        default: "RAK_4631_companion_radio_eth"
  push:
    paths:
      - "meshcore_overlay/**"
      - "scripts/**"
      - ".github/workflows/build-firmware.yml"
      - "README.md"
      - "docs/**"
    tags:
      - "v*"
      - "latest"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout overlay repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Resolve target env
        id: vars
        shell: bash
        run: |
          TARGET_ENV="${{ github.event.inputs.target_env }}"
          if [ -z "$TARGET_ENV" ]; then
            case "$GITHUB_REF_NAME" in
              v0.2.0-companion-radio-eth)
                TARGET_ENV="RAK_4631_companion_radio_eth"
                ;;
              v0.2.3-companion-eth-client-handoff)
                TARGET_ENV="RAK_4631_companion_radio_eth_clean"
                ;;
              v0.2.2-companion-eth-single-client)
                TARGET_ENV="RAK_4631_companion_radio_eth_clean"
                ;;
              v0.1.11-static-tcp-stable)
                TARGET_ENV="RAK_4631_companion_repeater_eth_ble_tcpstable"
                ;;
              v0.1.8-eth-pingonly)
                TARGET_ENV="RAK_4631_companion_repeater_eth_ble_pingonly"
                ;;
              v0.1.6-static-eth-debug)
                TARGET_ENV="RAK_4631_companion_repeater_eth_ble_staticdebug"
                ;;
              v0.1.5-dual-poll-eth-debug|v0.1.4-eth-debug)
                TARGET_ENV="RAK_4631_companion_repeater_eth_ble_ethdebug"
                ;;
              v0.1.2-ble-debug)
                TARGET_ENV="RAK_4631_companion_ble_overlay_debug"
                ;;
              *)
                TARGET_ENV="RAK_4631_companion_radio_eth"
                ;;
            esac
          fi
          echo "target_env=$TARGET_ENV" >> "$GITHUB_OUTPUT"

      - name: Build firmware
        env:
          MESHCORE_REF: ${{ github.event.inputs.meshcore_ref || 'main' }}
          TARGET_ENV: ${{ steps.vars.outputs.target_env }}
        run: bash scripts/build_firmware.sh

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.target_env }}
          path: dist/**
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**
          generate_release_notes: true
