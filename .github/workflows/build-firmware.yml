name: Build firmware

on:
  workflow_dispatch:
    inputs:
      meshcore_ref:
        description: "MeshCore branch, tag, or commit to build from"
        required: true
        default: "main"
      target_env:
        description: "PlatformIO environment"
        required: true
        default: "RAK_4631_companion_radio_eth"
  push:
    paths:
      - "meshcore_overlay/**"
      - "scripts/**"
      - ".github/workflows/build-firmware.yml"
      - "README.md"
      - "docs/**"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout overlay repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: "pip"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Build firmware
        env:
          MESHCORE_REF: ${{ github.event.inputs.meshcore_ref || 'main' }}
          TARGET_ENV: ${{ github.event.inputs.target_env || 'RAK_4631_companion_radio_eth' }}
        run: bash scripts/build_firmware.sh

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.target_env || 'RAK_4631_companion_radio_eth' }}
          path: dist/**
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**
          generate_release_notes: true
